<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1B3F8B">
<title>Mestre da Obra — Portal do Franqueado</title>

<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;-webkit-font-smoothing:antialiased;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;background:#F0F4FB;color:#0D1B3E;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}

/* ── TOKENS — Mestre da Obra Design System ── */
:root{
  /* Primária — Azul da marca */
  --primary:#1B3F8B;
  --primary-dark:#122B63;
  --primary-mid:#2E5EAA;
  --primary-soft:#EBF0FB;
  --primary-border:#C3D2F0;

  /* Amarelo — acento sutil da marca */
  --accent:#F5A623;
  --accent-dark:#D4881A;
  --accent-soft:#FEF6E7;
  --accent-border:#FCDFA0;

  /* Semânticas */
  --green:#1A8F5A;--green-soft:#E8F8F1;--green-border:#A3DFC3;
  --red:#C93030;--red-soft:#FEECEC;--red-border:#F5B8B8;
  --amber:#C47D0A;--amber-soft:#FEF5E0;--amber-border:#F7D98A;

  /* Legado — mantidos para compatibilidade */
  --orange:#1B3F8B;--orange-dark:#122B63;--orange-soft:#EBF0FB;
  --blue:#1B3F8B;--blue-soft:#EBF0FB;--blue-border:#C3D2F0;

  /* Superfícies */
  --surface:#FFFFFF;
  --surface-raised:#FFFFFF;
  --bg:#F0F4FB;
  --bg-mid:#E8EEF8;

  /* Bordas */
  --border:#DDE4F0;
  --border-mid:#C3D2F0;

  /* Tipografia */
  --text:#0D1B3E;
  --text-mid:#3D5080;
  --text-dim:#6B7DB3;
  --text-muted:#9DAAD0;

  /* Layout */
  --sidebar-w:252px;
  --radius:12px;
  --radius-sm:8px;
  --shadow-sm:0 1px 3px rgba(27,63,139,.06), 0 1px 2px rgba(27,63,139,.04);
  --shadow:0 4px 16px rgba(27,63,139,.08), 0 1px 4px rgba(27,63,139,.04);
  --shadow-lg:0 12px 40px rgba(27,63,139,.12), 0 4px 12px rgba(27,63,139,.06);
}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
.sb-head{
  padding:20px 18px 18px;
  display:flex;align-items:center;gap:0;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.sb-logo{
  width:100%;display:flex;align-items:center;
;mix-blend-mode:multiply}
.sb-logo{overflow:hidden}
.sb-logo img{
  height:52px;width:auto;
  object-fit:contain;object-position:left;
  mix-blend-mode:multiply;
  max-width:160px;
}
.sb-brand{display:none}
.sb-sub{display:none}
.sb-user{
  padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-user-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;color:var(--primary);
  background:var(--primary);flex-shrink:0;
}
.sb-user-row{display:flex;align-items:center;gap:10px}
.sb-user-nome{font-size:12px;font-weight:600;color:var(--text)}
.sb-user-cargo{font-size:10px;color:var(--text-dim);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-nav::-webkit-scrollbar{width:0}
.sb-group{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-muted);padding:14px 18px 5px;
}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:9px 18px;
  font-size:12px;font-weight:500;color:var(--text-dim);
  cursor:pointer;border:none;background:none;width:100%;text-align:left;
  transition:all .15s;border-radius:0;position:relative;
}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.ativo{
  background:var(--primary-soft);color:var(--primary);font-weight:600;
}
.sb-item.ativo::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;background:var(--accent);border-radius:0 2px 2px 0;
}
.sb-item .dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.25);flex-shrink:0;
  transition:background .15s;
}
.sb-item.ativo .dot{background:var(--accent)}
.sb-item .badge{
  margin-left:auto;min-width:18px;height:18px;border-radius:9px;
  background:var(--accent) !important;color:var(--primary-dark) !important;
  font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
}
.sb-foot{
  padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0;
  font-size:10px;color:var(--text-muted);text-align:center;
}
.sb-foot b{color:var(--text-dim);font-weight:500}

/* ── CONTEÚDO ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  padding:0 28px;height:56px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:sticky;top:0;z-index:10;
}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── CARDS / ESTATÍSTICAS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow-sm);transition:box-shadow .2s;
}
.stat-card:hover{box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px}
.stat-val{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.stat-val.verde{color:var(--green)}.stat-val.laranja{color:var(--primary)}.stat-val.cinza{color:var(--text-dim)}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:4px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.card-body{padding:18px}

/* ── TABELA DE FRANQUEADOS ── */
.frq-table{width:100%;border-collapse:collapse}
.frq-table th{
  padding:10px 14px;text-align:left;
  font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text-muted);border-bottom:1px solid var(--border);
  background:var(--bg);white-space:nowrap;
}
.frq-table td{
  padding:11px 12px;font-size:13px;color:var(--text-mid);
  border-bottom:1px solid #F5F5F5;vertical-align:middle;
}
.frq-table tr:last-child td{border-bottom:none}
.frq-table tbody tr{cursor:pointer;transition:background .1s}
.frq-table tbody tr:hover{background:#FAFAFA}
.frq-nome{font-weight:700;color:var(--text)}
.frq-ticket{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;
  background:#F5F5F5;color:var(--text-dim);border:1px solid var(--border);
  font-family:monospace;
}

/* ── ETAPA BADGE ── */
.etapa-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.etapa-pill.ok{background:var(--green-soft);color:var(--green)}
.etapa-pill.atual{background:var(--orange-soft);color:var(--orange)}
.etapa-pill.travada{background:#F5F5F5;color:var(--text-dim)}
.etapa-pill.legal{background:#EDE9FE;color:#6D28D9}

/* ── BOTÕES ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;
  font-family:'DM Sans',inherit;cursor:pointer;border:1px solid var(--border);
  background:var(--surface);color:var(--text-mid);transition:all .15s;
  letter-spacing:-.01em;
}
.btn:hover{background:var(--bg-mid);border-color:var(--border-mid);color:var(--text)}
.btn:active{transform:scale(.975)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.red{background:var(--red);color:#fff;border-color:var(--red)}
.btn.ghost{background:none;border:none;color:var(--primary);padding:6px 10px}
.btn.ghost:hover{background:var(--primary-soft)}
.btn.sm{padding:5px 11px;font-size:11px;border-radius:6px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:.01em}
.badge-green{background:var(--green-soft);color:var(--green)}
.badge-red{background:var(--red-soft);color:var(--red)}
.badge-amber{background:var(--amber-soft);color:var(--amber)}
.badge-orange{background:var(--primary-soft);color:var(--primary)}
.badge-blue{background:var(--primary-soft);color:var(--primary)}
.badge-gray{background:var(--bg-mid);color:var(--text-dim)}
.badge-purple{background:#EDE9FE;color:#5B21B6}

/* ── INPUT / FORM ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:5px}
.inp{
  width:100%;padding:9px 13px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;font-family:'DM Sans',inherit;color:var(--text);background:#fff;
  outline:none;transition:all .15s;
}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.inp:hover:not(:focus){border-color:var(--border-mid)}
.inp.err{border-color:var(--red);background:var(--red-soft)}
select.inp{cursor:pointer}
.inp-err{font-size:11px;color:var(--red);margin-top:4px;display:none}
.inp-err.show{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex}
.modal{
  background:#fff;border-radius:16px;width:100%;max-width:560px;
  max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(13,27,62,.18),0 4px 16px rgba(13,27,62,.08);
  animation:modalIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-head{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-titulo{font-size:15px;font-weight:800;color:var(--text)}
.modal-close{
  width:28px;height:28px;border-radius:50%;border:none;background:#F5F5F5;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text-dim);
}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}

/* ── FICHA DO FRANQUEADO (DRAWER) ── */
.drawer-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;
  display:none;
}
.drawer-bg.open{display:block}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:640px;max-width:95vw;
  background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.12);
  display:flex;flex-direction:column;z-index:401;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  padding:0 20px;height:56px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.drawer-ticket{font-size:11px;font-weight:700;font-family:monospace;padding:3px 8px;border-radius:6px;background:#F5F5F5;border:1px solid var(--border);color:var(--text-dim)}
.drawer-nome{font-size:15px;font-weight:800;color:var(--text);flex:1}
.drawer-body{flex:1;overflow-y:auto;padding:0}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.drawer-foot{
  padding:12px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:#fff;
}

/* ── SEÇÕES DA FICHA ── */
.ficha-secao{padding:16px 20px;border-bottom:1px solid #F5F5F5}
.ficha-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px}
.dados-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dado-item .dado-l{font-size:10px;color:var(--text-dim);margin-bottom:2px}
.dado-item .dado-v{font-size:13px;font-weight:600;color:var(--text)}

/* ── ETAPAS ── */
.etapa-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:12px 20px;border-bottom:1px solid #F5F5F5;
  cursor:pointer;transition:background .1s;
}
.etapa-item:hover{background:#FAFAFA}
.etapa-item.bloqueada{cursor:default;opacity:.6}
.etapa-item.bloqueada:hover{background:transparent}
.etapa-num{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;margin-top:1px;
}
.etapa-num.concluida{background:var(--green);color:#fff}
.etapa-num.atual{background:var(--primary);color:#fff}
.etapa-num.pendente{background:#F5F5F5;color:var(--text-dim);border:1.5px solid var(--border)}
.etapa-info{flex:1}
.etapa-nome{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.etapa-desc{font-size:11px;color:var(--text-dim);line-height:1.4}
.etapa-legal{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#EDE9FE;color:#6D28D9;margin-left:6px}

/* ── PASTAS ── */
.pastas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 20px}
.pasta-card{
  display:flex;align-items:center;gap:10px;
  padding:12px;border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .12s;
}
.pasta-card:hover{border-color:var(--orange);background:var(--orange-soft)}
.pasta-icon{width:36px;height:36px;border-radius:8px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pasta-nome{font-size:12px;font-weight:700;color:var(--text)}
.pasta-arq{font-size:10px;color:var(--text-muted);margin-top:1px}

/* ── HISTÓRICO ── */
.hist-item{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid #F5F5F5}
.hist-item:last-child{border-bottom:none}
.hist-data{font-size:11px;color:var(--text-dim);white-space:nowrap;min-width:80px}
.hist-texto{font-size:12px;color:var(--text);flex:1}
.hist-autor{font-size:11px;color:var(--text-muted);white-space:nowrap}

/* ── ASSINATURA ── */
.ass-box{
  background:#F5F5F5;border:1.5px solid var(--border);border-radius:10px;
  padding:14px;margin-bottom:12px;
}
.ass-texto{font-size:12px;color:var(--text-mid);line-height:1.7;margin-bottom:10px;max-height:160px;overflow-y:auto}
.ass-aviso{font-size:10px;color:var(--text-muted);font-style:italic;margin-bottom:10px;line-height:1.5}
.ass-btn{
  width:100%;padding:11px;border-radius:8px;border:none;
  background:var(--orange);color:#fff;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:all .15s;
  opacity:.4;pointer-events:none;
}
.ass-btn.pronto{opacity:1;pointer-events:auto}
.ass-btn.pronto:hover{background:var(--orange-dark)}

/* ── CHAT ── */
.chat-layout{display:flex;height:100%;overflow:hidden}
.chat-lista{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.chat-lista-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;flex-shrink:0}
.chat-lista-scroll{flex:1;overflow-y:auto}
.chat-lista-scroll::-webkit-scrollbar{width:0}
.conv-item{padding:12px 14px;border-bottom:1px solid #F5F5F5;cursor:pointer;transition:background .1s}
.conv-item:hover{background:#FAFAFA}
.conv-item.ativo{background:var(--orange-soft)}
.conv-nome{font-size:13px;font-weight:700;color:var(--text)}
.conv-prev{font-size:11px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-badge{display:inline-flex;min-width:18px;height:18px;border-radius:9px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;align-items:center;justify-content:center;padding:0 3px;float:right;margin-top:2px}
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;background:#F9F9F9;display:flex;flex-direction:column;gap:6px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg-wrap{display:flex;flex-direction:column;max-width:75%}
.msg-wrap.mine{align-self:flex-end;align-items:flex-end}
.msg-wrap.theirs{align-self:flex-start;align-items:flex-start}
.msg{border-radius:12px;padding:8px 12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.mine{background:var(--orange);color:#fff;border-bottom-right-radius:3px}
.msg.theirs{background:#fff;border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}
.msg.formal{
  background:#EDE9FE;border:1px solid #C4B5FD;color:#4C1D95;
  border-radius:10px;align-self:center;max-width:90%;font-weight:500;
}
.msg-formal-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#7C3AED;margin-bottom:4px}
.msg-tm{font-size:9px;color:var(--text-muted);margin-top:2px}
.chat-inp-area{
  padding:10px 14px;background:#fff;border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
}
.chat-inp{
  flex:1;border:1.5px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:13px;font-family:inherit;
  resize:none;outline:none;max-height:80px;background:#F9F9F9;
}
.chat-inp:focus{border-color:var(--orange);background:#fff}
.chat-send{
  width:36px;height:36px;border-radius:50%;background:var(--orange);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-formal-btn{padding:5px 10px;border-radius:7px;border:1px solid #C4B5FD;background:#EDE9FE;color:#6D28D9;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:600;display:flex;flex-direction:column;gap:6px}
.toast{
  background:#0F0F0F;color:#fff;padding:10px 16px;border-radius:10px;
  font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;

  cursor:pointer;transition:background .12s;
}
.etapa-step:last-child { border-bottom:none }
.etapa-circle {
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;transition:all .15s;
}
.etapa-circle.ok    { background:var(--green-soft);color:var(--green) }
.etapa-circle.atual { background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(27,63,139,.3) }
.etapa-circle.lock  { background:var(--bg);color:var(--text-muted);border:1.5px solid var(--border) }

/* Task */
.task-row {
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.task-row:last-child { border-bottom:none }
.task-check {
  width:22px;height:22px;border-radius:7px;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.task-check.ok { background:var(--green);border-color:var(--green) }

/* Alerta pill */
.alerta-row {
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:12px;margin-bottom:8px;
  cursor:pointer;border:1px solid;transition:all .15s;
}
.alerta-row:hover { transform:translateX(3px) }
.alerta-row.amber { border-color:var(--amber-border);background:var(--amber-soft) }
.alerta-row.red   { border-color:var(--red-border);background:var(--red-soft) }

/* Chat */
.chat-msgs {
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--bg);
}
.balao-eu {
  align-self:flex-end;max-width:80%;
  background:var(--accent);color:var(--primary-dark);
  padding:9px 13px;border-radius:14px 4px 14px 14px;
  font-size:13px;line-height:1.5;
  box-shadow:0 1px 4px rgba(245,166,35,.2);
}
.balao-deles {
  align-self:flex-start;max-width:80%;
  background:#fff;border:1px solid var(--border);
  padding:9px 13px;border-radius:4px 14px 14px 14px;
  font-size:13px;line-height:1.5;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.balao-global {
  background:var(--primary-soft);border:1px solid var(--primary-border);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
}
.chat-canal-btn {
  flex:1;padding:9px;border-radius:10px;
  border:1.5px solid var(--border);background:#fff;
  color:var(--text-dim);font-family:inherit;font-size:12.5px;
  font-weight:600;cursor:pointer;transition:all .15s;
}
.chat-canal-btn.ativo {
  background:var(--primary);color:#fff;border-color:var(--primary);
  box-shadow:0 2px 8px rgba(27,63,139,.2);
}
.chat-input-portal {
  flex:1;border:1.5px solid var(--border);border-radius:12px;
  padding:10px 13px;font-family:inherit;font-size:13px;
  resize:none;outline:none;max-height:100px;line-height:1.4;
  transition:border-color .15s;background:var(--bg);
}
.chat-input-portal:focus { border-color:var(--accent) }

/* Cal mini */
.cal-grid-p { display:grid;grid-template-columns:repeat(7,1fr);gap:3px }
.cal-head-p { font-size:9.5px;font-weight:700;text-align:center;color:var(--text-muted);padding:3px 0 }
.cal-cell-p {
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  border-radius:8px;padding:4px 2px;cursor:pointer;transition:background .12s;
}
.cal-cell-p:hover { background:var(--primary-soft) }
.cal-cell-p.hj { background:var(--primary) }
.cal-cell-p.hj .cal-n-p { color:#fff;font-weight:800 }
.cal-cell-p.off { opacity:.3 }
.cal-n-p { font-size:11px;font-weight:600;color:var(--text) }
.cal-dot-p { width:4px;height:4px;border-radius:50%;margin-top:2px;background:var(--accent) }
.cal-cell-p.hj .cal-dot-p { background:#fff }

/* Validar btn */
.btn-validar {
  width:100%;padding:13px;border-radius:12px;
  background:var(--primary);color:#fff;border:none;
  font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(27,63,139,.25);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);display:flex;
  align-items:center;justify-content:center;gap:8px;
}
.btn-validar:hover { transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,63,139,.35) }
</style>

</head>

async function enviarRecuperacaoSenha() {
  const email  = document.getElementById('rec-email')?.value?.trim().toLowerCase();
  const msgEl  = document.getElementById('rec-msg');

  if(!email) {
    msgEl.style.display = 'block';
    msgEl.style.background = '#FEE2E2';
    msgEl.style.color = '#DC2626';
    msgEl.textContent = 'Informe o e-mail de acesso.';
    return;
  }

  // Feedback de carregamento
  msgEl.style.display = 'block';
  msgEl.style.background = '#EFF6FF';
  msgEl.style.color = '#1E40AF';
  msgEl.textContent = '⏳ Enviando...';

  try {
    await auth.sendPasswordResetEmail(email, {
      url: window.location.href, // redireciona de volta ao portal após redefinir
      handleCodeInApp: false,
    });

    // Sucesso
    msgEl.style.background = '#F0FDF4';
    msgEl.style.color = '#166534';
    msgEl.innerHTML = `
      <strong>✓ E-mail enviado!</strong><br>
      Verifique sua caixa de entrada em <strong>${email}</strong>.<br>
      Clique no link recebido para criar sua nova senha.<br>
      <span style="font-size:10.5px;color:#6B7280;margin-top:4px;display:block">
        Não recebeu? Verifique o spam ou aguarde alguns minutos.
      </span>`;

    // Desabilitar botão para evitar reenvio imediato
    const btn = document.querySelector('#tela-recuperacao button');
    if(btn) {
      btn.disabled = true;
      btn.textContent = 'E-mail enviado';
      btn.style.background = '#D1D5DB';
      btn.style.color = '#6B7280';
    }

  } catch(err) {
    msgEl.style.background = '#FEE2E2';
    msgEl.style.color = '#DC2626';
    if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-email') {
      msgEl.textContent = 'E-mail não encontrado. Verifique o endereço digitado ou entre em contato com seu gestor.';
    } else if(err.code === 'auth/too-many-requests') {
      msgEl.textContent = 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
    } else {
      msgEl.textContent = 'Erro ao enviar: ' + (err.message || 'tente novamente.');
    }
  }
}

function fazerLogoutPortal() {

  PORTAL = {};

  try { db.ref('chamados/' + (PORTAL.fid||'')).off(); } catch(e) {}

function fazerLogin() {
  const email = $('login-email')?.value?.trim().toLowerCase();
  const senha  = $('login-senha')?.value;
  const erro   = $('login-erro');

  if(!email || !senha) {
    erro.style.display='block';
    erro.textContent='Preencha e-mail e senha.';
    return;
  }

  // Feedback visual
  erro.style.display='block';
  erro.style.background='#EFF6FF';
  erro.style.color='#1E40AF';
  erro.style.borderColor='#BFDBFE';
  erro.textContent='Verificando...';

  // Autenticar via Firebase Auth (onde o painel registra o franqueado)
  auth.signInWithEmailAndPassword(email, senha)
    .then(cred => {
      const uid = cred.user.uid;
      // Buscar mapeamento uid → fid no Firebase DB
      return db.ref('portal_usuarios/' + uid).once('value').then(snap => {
        const dados = snap.val();
        const fid = dados?.fid || dados?.franqueadoId;
        if(!fid) throw new Error('Cadastro não encontrado. Fale com sua gestora.');
        return fid;
      });
    })
    .then(fid => {
      // Buscar dados completos do franqueado
      // 1. Tentar localStorage (mais rápido)
      let franqueado = null;
      try {
        const lista = JSON.parse(localStorage.getItem('mo_franqueados') || '[]');
        franqueado = lista.find(f => f.id === fid);
      } catch(e) {}

      if(franqueado) {
        return montarPortal(franqueado, senha);
      }

      // 2. Fallback: buscar no Firebase DB
      return db.ref('franqueados/' + fid).once('value').then(snap => {
        const f = snap.val();
        if(!f) throw new Error('Dados do franqueado não encontrados.');
        return montarPortal(f, senha);
      });
    })
    .catch(err => {
      erro.style.background = '#FEE2E2';
      erro.style.color = '#DC2626';
      erro.style.borderColor = '#FECACA';
      if(err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-login-credentials') {
        erro.textContent = 'E-mail ou senha incorretos. Verifique os dados ou contate seu gestor.';
      } else if(err.code === 'auth/too-many-requests') {
        erro.textContent = 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
      } else if(err.code === 'auth/invalid-email') {
        erro.textContent = 'E-mail inválido. Verifique o endereço digitado.';
      } else if(err.code === 'auth/network-request-failed') {
        erro.textContent = 'Sem conexão. Verifique sua internet e tente novamente.';
      } else {
        erro.textContent = err.message || 'Erro ao conectar. Tente novamente.';
        console.error('Login erro:', err.code, err.message);
      }
    });
}

function montarPortal(f, senhaUsada) {
  if(!f) return; // segurança
  // Montar objeto PORTAL com os dados do franqueado vindos do painel
  const gestor = f.gestor
    ? (typeof f.gestor === 'object' ? f.gestor : { nome: String(f.gestor) })
    : {};

  // Se gestor é um token string, buscar nos dados da equipe
  let gestorObj = gestor;
  if(f.gestorToken || (typeof f.gestor === 'string' && f.gestor.includes('-'))) {
    const token = f.gestorToken || f.gestor;
    // Garantir que o token sempre está preservado (Firebase não está acessível aqui)
    gestorObj = { nome: f.gestorNome || gestorObj.nome !== token ? (f.gestorNome || gestorObj.nome) : '', token, cor: '#1B3F8B', tel: '', email: '', cargo: '' };
    // Tentar enriquecer com dados da equipe no localStorage (painel)
    try {
      const equipe = JSON.parse(localStorage.getItem('mo_equipe_rh') || '[]');
      const membroEquipe = equipe.find(e => e.token === token || e.id === token);
      if(membroEquipe) {
        gestorObj = {
          nome:  membroEquipe.nome,
          token: membroEquipe.token,
          cor:   membroEquipe.cor || '#1B3F8B',
          tel:   membroEquipe.tel || '',
          email: membroEquipe.email || '',
          cargo: membroEquipe.cargo || '',
        };
      }
    } catch(e) {}
    // Se nome ainda não foi resolvido, buscar no Firebase de forma assíncrona
    if(!gestorObj.nome) {
      try {
        db.ref('equipe/' + token).once('value').then(snap => {
          const m = snap.val();
          if(m && m.nome) { PORTAL.gestor.nome = m.nome; PORTAL.gestor.cor = m.cor || '#1B3F8B'; }
        });
      } catch(e) {}
    }
  }

  PORTAL = {
    fid:             f.id,
    nome:            f.nome,
    ticket:          f.ticket,
    email:           f.email,
    cidade:          f.cidade || '',
    uf:              f.uf || '',
    modelo:          f.modelo || '',
    etapaAtual:      f.etapaAtual || 0,
    processoIniciado: f.processoIniciado || false,
    portalLiberado:  f.portalLiberado || false,
    gestor:          gestorObj,
    _senhaAtual:     senhaUsada,
    drivePasstas:    f.drivePasstas || null,
  };

  $('tela-login').style.display='none';

  // Verificar se já trocou a senha do 1º acesso (localStorage OU Firebase)
  let senhaTrocada = localStorage.getItem('senha_trocada_' + PORTAL.fid) === '1';
  if(!senhaTrocada && f.senhaTrocada && f.senhaTrocada.trocada) {
    senhaTrocada = true;
    localStorage.setItem('senha_trocada_' + PORTAL.fid, '1');
  }
  if(!senhaTrocada) {
    renderTrocarSenha();
    return;
  }

  entrarNoPortal();
}

function entrarNoPortal() {
  $('app').style.display='flex';
  $('app').style.flexDirection='column';
  $('topbar-av').textContent = ini(PORTAL.nome);
  $('topbar-ticket').textContent = PORTAL.ticket || PORTAL.fid || '';
  irAba('inicio', document.querySelector('[data-aba=inicio]'));
  atualizarBadges();
  // Listener para notificações do gestor
  try {
    db.ref('notif_franqueado/' + PORTAL.fid).on('value', snap => {
      const notif = snap.val();
      if(!notif || notif.lido) return;
      processarNotifGestor(notif);
    });
  } catch(e) {}

  // Listener em tempo real: atualizar dados do franqueado
  try {
    db.ref('franqueados/' + PORTAL.fid).on('value', snap => {
      const f = snap.val();
      if(!f) return;
      PORTAL.etapaAtual       = f.etapaAtual       ?? PORTAL.etapaAtual;
      PORTAL.processoIniciado = f.processoIniciado  ?? PORTAL.processoIniciado;
      PORTAL.portalLiberado   = f.portalLiberado    ?? PORTAL.portalLiberado;
      if(f.drivePasstas) PORTAL.drivePasstas = f.drivePasstas;
    });
  } catch(e) {}

  // Listener para chamados — atualiza badge e tela quando gestor responde
  try {
    db.ref('chamados/' + PORTAL.fid).on('value', snap => {
      const raw = snap.val();
      if(!raw) return;
      const lista = Array.isArray(raw) ? raw.filter(Boolean) : Object.values(raw).filter(Boolean);

      // Atualizar cache local
      try { localStorage.setItem('suporte_' + PORTAL.fid, JSON.stringify(lista)); } catch(e) {}

      // Atualizar badge
      const n = lista.filter(c => c.status === 'aberto' || c.status === 'em_andamento').length;
      const badge = document.getElementById('badge-suporte-p');
      if(badge) {
        badge.style.display = n > 0 ? 'block' : 'none';
        badge.textContent   = n;
      }

      // Verificar se há resposta nova do gestor (notificação visual)
      const comResposta = lista.filter(c =>
        c.respostaGestor && c.status === 'em_andamento' && !c._vistoPeloFranqueado
      );
      if(comResposta.length > 0) {
        // Toast de notificação
        const ch = comResposta[0];
        if(document.getElementById('badge-suporte-p')) {
          // Só notifica se não estiver na aba suporte
          if(_aba !== 'suporte') {
            const badge2 = document.getElementById('badge-suporte-p');
            if(badge2) {
              badge2.style.background = '#F5A623';
              badge2.style.color      = '#1B3F8B';
            }
          }
        }
      }

      // Se estiver na aba suporte, re-renderizar
      if(_aba === 'suporte') renderSuporte();
    });
  } catch(e) {}
}

function confirmarTrocaSenha() {
  const nova     = $('ts-nova')?.value;
  const confirma = $('ts-confirma')?.value;
  const erroEl   = $('ts-erro');

  if(!nova || nova.length < 6) {
    erroEl.style.display='block';
    erroEl.textContent='A senha deve ter pelo menos 6 caracteres.';
    return;
  }
  if(nova !== confirma) {
    erroEl.style.display='block';
    erroEl.textContent='As senhas não coincidem.';
    return;
  }
  // Não deixar usar a mesma senha provisória
  if(nova === (PORTAL._senhaAtual || '')) {
    erroEl.style.display='block';
    erroEl.textContent='Sua nova senha deve ser diferente da senha provisória.';
    return;
  }

  // Desabilitar botão para evitar duplo clique
  const btnConfirmar = document.querySelector('#tela-troca-senha button');
  if(btnConfirmar) {
    btnConfirmar.disabled = true;
    btnConfirmar.textContent = '⏳ Salvando...';
  }

  // PASSO 1 — Atualizar senha no Firebase Auth (fonte da verdade)
  const user = auth.currentUser;
  if(!user) {
    erroEl.style.display='block';
    erroEl.textContent='Sessão expirada. Faça login novamente.';
    if(btnConfirmar) { btnConfirmar.disabled=false; btnConfirmar.textContent='Confirmar minha senha'; }
    return;
  }

  user.updatePassword(nova)
    .then(() => {
      // PASSO 2 — Registrar localmente
      const agora_str = new Date().toLocaleDateString('pt-BR') + ' às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      localStorage.setItem('senha_trocada_' + PORTAL.fid, '1');
      localStorage.setItem('senha_trocada_data_' + PORTAL.fid, agora_str);

      // PASSO 3 — Registrar no Firebase DB para o painel ver
      try {
        db.ref('franqueados/' + PORTAL.fid + '/senhaTrocada').set({
          trocada:   true,
          data:      agora_str,
          timestamp: Date.now(),
        });
      } catch(e) {}

      // PASSO 4 — Notificar painel via localStorage
      try {
        const reg = {
          fid:    PORTAL.fid,
          ticket: PORTAL.ticket,
          nome:   PORTAL.nome,
          data:   agora_str,
          acao:   'senha_alterada_primeiro_acesso',
        };
        const hist = JSON.parse(localStorage.getItem('portal_eventos') || '[]');
        hist.push(reg);
        localStorage.setItem('portal_eventos', JSON.stringify(hist));
      } catch(e) {}

      // PASSO 5 — Remover overlay e seguir
      const overlay = $('tela-troca-senha');
      if(overlay) overlay.remove();
      entrarNoPortal();
    })
    .catch(err => {
      // auth/requires-recent-login — precisa reautenticar antes de trocar senha
      if(err.code === 'auth/requires-recent-login') {
        // Reautenticar com a senha provisória e tentar novamente
        const credential = firebase.auth.EmailAuthProvider.credential(
          user.email, PORTAL._senhaAtual || '123456'
        );
        user.reauthenticateWithCredential(credential)
          .then(() => user.updatePassword(nova))
          .then(() => {
            const agora_str = new Date().toLocaleDateString('pt-BR') + ' às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            localStorage.setItem('senha_trocada_' + PORTAL.fid, '1');
            localStorage.setItem('senha_trocada_data_' + PORTAL.fid, agora_str);
            try { db.ref('franqueados/' + PORTAL.fid + '/senhaTrocada').set({ trocada:true, data:agora_str, timestamp:Date.now() }); } catch(e) {}
            const overlay = $('tela-troca-senha');
            if(overlay) overlay.remove();
            entrarNoPortal();
          })
          .catch(e2 => {
            erroEl.style.display='block';
            erroEl.textContent='Erro ao salvar senha: ' + (e2.message || 'tente novamente.');
            if(btnConfirmar) { btnConfirmar.disabled=false; btnConfirmar.textContent='Confirmar minha senha'; }
          });
      } else {
        erroEl.style.display='block';
        erroEl.textContent='Erro ao salvar senha: ' + (err.message || 'tente novamente.');
        if(btnConfirmar) { btnConfirmar.disabled=false; btnConfirmar.textContent='Confirmar minha senha'; }
      }
    });
}

// getChamados agora é async — lê do Firebase (fonte da verdade)
async function getChamados() {
  try {
    const snap = await db.ref('chamados/' + PORTAL.fid).once('value');
    const raw  = snap.val();
    if(!raw) return [];
    // Firebase pode retornar objeto com índices numéricos — garantir array
    const lista = Array.isArray(raw)
      ? raw.filter(Boolean)
      : Object.values(raw).filter(Boolean);
    return lista;
  } catch(e) {
    try {
      const snap = localStorage.getItem('suporte_' + PORTAL.fid);
      return snap ? JSON.parse(snap) : [];
    } catch(e2) { return []; }
  }
}

function sanitizarParaFirebase(obj) {
  // Remove undefined e converte para null-safe recursivamente
  if(Array.isArray(obj)) return obj.map(sanitizarParaFirebase).filter(x => x !== undefined);
  if(obj && typeof obj === 'object') {
    const out = {};
    Object.keys(obj).forEach(k => {
      const v = obj[k];
      if(v === undefined) return; // omitir undefined
      out[k] = sanitizarParaFirebase(v);
    });
    return out;
  }
  return obj ?? null;
}

function salvarChamados(lista) {
  const listaLimpa = sanitizarParaFirebase(lista);
  // Salvar no Firebase (fonte da verdade)
  db.ref('chamados/' + PORTAL.fid).set(listaLimpa)
    .catch(e => console.warn('salvarChamados Firebase:', e.message));
  // Cache local
  try { localStorage.setItem('suporte_' + PORTAL.fid, JSON.stringify(lista)); } catch(e) {}
}

async function confirmarReabertura(chamadoId) {
  const motivo = $('reab-motivo')?.value?.trim();
  if(!motivo || motivo.length < 10) {
    toast('Descreva melhor o motivo (mínimo 10 caracteres).', 'rd');
    return;
  }

  try {
    const lista   = await getChamados();
    const chamado = lista.find(c => c.id === chamadoId);
    if(!chamado) return;

    // Preservar histórico de respostas anteriores
    // Sanitizar: Firebase rejeita campos undefined
    if(!chamado.historico) chamado.historico = [];
    const entradaHistorico = {
      respostaGestor:    chamado.respostaGestor    || null,
      dataResposta:      chamado.dataResposta       || null,
      gestorNome:        chamado.gestorNome         || null,
      retornoFranqueado: motivo,
      dataRetorno:       hoje() + ' às ' + agora(),
    };
    // Remover chaves com null para não poluir o Firebase
    Object.keys(entradaHistorico).forEach(k => {
      if(entradaHistorico[k] === null) delete entradaHistorico[k];
    });
    chamado.historico.push(entradaHistorico);

    // Reabrir
    chamado.status          = 'aberto';
    // Manter respostaGestor visível no histórico mas marcar como reaberto
    chamado.resolvidoGestor = false;
    chamado.retornoFranqueado = motivo;
    chamado.dataRetorno     = hoje() + ' às ' + agora();
    chamado.totalRetornos   = (chamado.totalRetornos || 0) + 1;

    salvarChamados(lista);
    fecharModal();
    toast('Chamado reaberto. Seu gestor será notificado.', 'or');
    renderSuporte();
  } catch(e) {
    toast('Erro ao reabrir: ' + e.message, 'rd');
  }
}

function confirmarAbrirChamado() {
  const categoria = $('cham-categoria')?.value;
  const item      = $('cham-item')?.value;
  const descricao = $('cham-descricao')?.value?.trim();
  const erroEl    = $('cham-erro');

  if(!categoria) { erroEl.style.display='block'; erroEl.textContent='Selecione uma categoria.'; return; }
  if(!item)      { erroEl.style.display='block'; erroEl.textContent='Selecione o assunto específico.'; return; }
  if(!descricao || descricao.length < 10) { erroEl.style.display='block'; erroEl.textContent='Descreva o problema (mínimo 10 caracteres).'; return; }

  const tipo     = TIPOS_CHAMADO.find(t => t.id === categoria);
  const id       = gerarIdChamado();
  const chamado  = {
    id,
    categoria,
    titulo:       item,
    descricao,
    etapaAberta:  PORTAL.etapaAtual || 0,
    nomeEtapa:    PORTAL.etapaAtual > 0 ? 'Etapa ' + PORTAL.etapaAtual : 'Pré-implantação',
    status:       'aberto',
    dataAbertura: hoje(),
    horaAbertura: agora(),
    timestamp:    Date.now(),
    franqueado:   PORTAL.nome,
    ticket:       PORTAL.ticket,
    fid:          PORTAL.fid,
    gestorToken:  PORTAL.gestor?.token || '',
  };

  // getChamados retorna array — garantir que é array antes de unshift
  getChamados().then(raw => {
    const lista = Array.isArray(raw) ? raw : (raw ? Object.values(raw) : []);
    lista.unshift(chamado);
    salvarChamados(lista);
    fecharModal();
    toast('Chamado ' + id + ' aberto. Seu gestor será notificado.', 'gn');
    renderSuporte();
  }).catch(e => {
    salvarChamados([chamado]);
    fecharModal();
    toast('Chamado ' + id + ' aberto.', 'gn');
    renderSuporte();
  });
}

async function assinarConclusaoChamado(chamadoId) {
  const lista   = await getChamados();
  const chamado = lista.find(c => c.id === chamadoId);
  if(!chamado) return;

  const declaracao = `Eu, ${PORTAL.nome}, confirmo que o chamado ${chamadoId} foi atendido satisfatoriamente pelo gestor ${chamado.gestorNome||'—'} em ${hoje()} às ${agora()}. Assunto: ${chamado.titulo}.`;

  // Mostrar histórico de trocas se houver
  const histHTML = (chamado.historico||[]).map((h,i) => `
    <div style="border-left:3px solid #FDE68A;padding:6px 10px;margin-bottom:6px;background:#FFFBEB;border-radius:4px">

      <div style="font-size:11px;color:#92400E;margin-top:2px">Retorno: ${h.retornoFranqueado||'—'}</div>
    </div>`).join('');

  abrirModal('Confirmar atendimento', `
    <div style="background:#F0FDF4;border-radius:8px;padding:12px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">✓ Confirmar que o chamado foi resolvido</div>
      <div style="font-size:12px;color:var(--text);margin-bottom:4px"><b>Assunto:</b> ${chamado.titulo}</div>
      <div style="font-size:12px;color:var(--text-dim)"><b>Última resposta:</b> ${chamado.respostaGestor}</div>
    </div>
    ${histHTML ? `
    <details style="margin-bottom:12px">
      <summary style="font-size:11px;color:var(--text-dim);cursor:pointer">Ver histórico de trocas (${chamado.historico.length})</summary>
      <div style="margin-top:8px">${histHTML}</div>

      ⚠ Ao assinar, você confirma que o problema foi resolvido. Esta ação é irreversível.
    </div>
    <div id="ass-conclusao-container"></div>
    <button onclick="fecharModal()"
      style="width:100%;margin-top:8px;padding:10px;border-radius:10px;background:none;border:1.5px solid var(--border);cursor:pointer;font-size:13px;color:var(--text-dim)">
      Cancelar
    </button>
  `, '');

  setTimeout(() => {
    renderAssBox('ass-conclusao-container', declaracao, 'Assinar e confirmar atendimento', async () => {
      const hash = Math.abs(declaracao.split('').reduce((h,ch)=>((h<<5)-h)+ch.charCodeAt(0),0)).toString(16);
      const lista2 = await getChamados();
      const c2     = lista2.find(c => c.id === chamadoId);
      if(c2) {
        c2.status               = 'concluido';
        c2.assinaturaFranqueado = true;

        c2.hashConclusao        = hash;
        c2.dataAssinatura       = hoje() + ' às ' + agora();

      renderSuporte();
    }, '#F5A623', '#1B3F8B'); // botão amarelo com texto azul
  }, 150);
}


/* ══════════════════════════════════════════════════════════════
   BLOCO C — AGENDAMENTO DE REUNIÕES (PORTAL DO FRANQUEADO)
   Franqueado vê vagas disponíveis e agenda com 48h de antecedência
   Uma reunião por vez — só pode agendar nova após concluir a atual
══════════════════════════════════════════════════════════════ */

function getDisponibilidadeGestor() {
  // Ler do Firebase — disponibilidade configurada pelo gestor
  return new Promise(resolve => {
    const token = PORTAL.gestor?.token || '';
    console.log('[Agenda] getDisponibilidadeGestor token:', token);
    if(!token) { console.warn('[Agenda] token vazio — PORTAL.gestor:', JSON.stringify(PORTAL.gestor)); resolve({}); return; }
    db.ref('disponibilidade/' + token).once('value')
      .then(snap => resolve(snap.val() || {}))
      .catch(() => resolve({}));
  });
}

function getReunioesPortal() {
  return new Promise(resolve => {
    db.ref('reunioes').once('value')
      .then(snap => {
        const raw = snap.val();
        if(!raw) { resolve([]); return; }
        const lista = Array.isArray(raw) ? raw : Object.values(raw);
        resolve(lista.filter(Boolean));
      })
      .catch(() => resolve([]));
  });
}

async function renderAgendaReunioes() {
  $('portal-content').innerHTML = `
    <div style="text-align:center;padding:40px 20px;color:var(--text-dim)">
      <div style="font-size:24px;margin-bottom:8px">⏳</div>
      <div style="font-size:13px">Carregando vagas disponíveis...</div>
    </div>`;

  const [disp, todasReunioes] = await Promise.all([
    getDisponibilidadeGestor(),
    getReunioesPortal(),
  ]);

  // Verificar se já tem reunião agendada
  const minhaReuniao = todasReunioes.find(r =>
    r.fid === PORTAL.fid && r.status === 'agendada'
  );

  // Verificar notificações do gestor (cancelamento, reagendamento)
  let notif = null;
  try {
    const snap = await db.ref('reunioes_notif/' + PORTAL.fid).once('value');
    notif = snap.val();
  } catch(e) {}

  if(minhaReuniao) {
    renderMihaReuniao(minhaReuniao, notif);
    return;
  }

  // Diagnóstico — visível no console do portal
  console.log('[Agenda] token gestor:', PORTAL.gestor?.token, '| disp:', JSON.stringify(disp));

  // Verificar se o gestor configurou ao menos um dia com horários
  const diasAtivos = disp.dias ? Object.values(disp.dias).filter(d => d.ativo && d.horarios?.length > 0) : [];
  if(!disp.dias || diasAtivos.length === 0) {
    const temDiasSemHorario = disp.dias && Object.values(disp.dias).some(d => d.ativo && (!d.horarios || d.horarios.length === 0));
    $('portal-content').innerHTML = `
      <div style="text-align:center;padding:48px 20px;color:var(--text-dim)">
        <div style="font-size:36px;margin-bottom:12px">📅</div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">Sem vagas disponíveis</div>
        <div style="font-size:12px;line-height:1.6">${temDiasSemHorario
          ? 'Seu gestor marcou dias disponíveis mas ainda não preencheu os horários.<br>Entre em contato pelo MO Talk.'
          : 'Seu gestor ainda não configurou os horários de atendimento.<br>Entre em contato pelo MO Talk.'
        }</div>
      </div>`;
    return;
  }

  // Gerar vagas disponíveis (próximos 14 dias, mínimo 48h de antecedência)
  const vagas = gerarVagasDisponiveis(disp, todasReunioes);

  if(vagas.length === 0) {
    $('portal-content').innerHTML = `
      <div style="text-align:center;padding:48px 20px;color:var(--text-dim)">
        <div style="font-size:36px;margin-bottom:12px">📭</div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">Nenhuma vaga disponível</div>
        <div style="font-size:12px">Não há vagas nos próximos 14 dias com antecedência mínima de 48h.<br>Tente mais tarde ou use o MO Talk.</div>
      </div>`;
    return;
  }

  // Agrupar vagas por data
  const porData = {};
  vagas.forEach(v => {
    if(!porData[v.data]) porData[v.data] = [];
    porData[v.data].push(v);
  });

  $('portal-content').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:16px;font-weight:800;color:var(--text)">Agendar reunião</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:2px">
        Selecione uma vaga disponível · Mínimo 48h de antecedência · Uma reunião por vez
      </div>
    </div>

    ${notif ? renderNotifGestor(notif) : ''}

    <div style="display:flex;flex-direction:column;gap:14px">
      ${Object.entries(porData).map(([data, horas]) => `
        <div style="background:#fff;border-radius:12px;padding:14px;border:1px solid var(--border)">
          <div style="font-size:12px;font-weight:800;color:var(--primary);margin-bottom:10px">
            📅 ${formatarDataExtenso(data)}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${horas.map(v => `
              <button onclick="selecionarVaga('${data}','${v.hora}','${disp.link}',${disp.duracao||60})"
                style="padding:8px 16px;border-radius:10px;border:1.5px solid var(--primary-border);background:var(--primary-soft);color:var(--primary);font-size:13px;font-weight:700;cursor:pointer">
                ${v.hora}
              </button>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;

function gerarVagasDisponiveis(disp, todasReunioes) {
  const diasSemana = ['dom','seg','ter','qua','qui','sex','sab'];
  const vagas = [];
  const agora2 = new Date();
  const limite24h = new Date(agora2.getTime() + 48*3600*1000); // 48h de antecedência mínima

  // Próximos 14 dias
  for(let d=1; d<=14; d++) {
    const data = new Date(agora2);
    data.setDate(data.getDate() + d);
    data.setHours(0,0,0,0);

    const diaSem = diasSemana[data.getDay()];
    const dispDia = disp.dias?.[diaSem];
    if(!dispDia?.ativo || !dispDia.horarios?.length) continue;

    const dataStr = data.toISOString().slice(0,10);

    dispDia.horarios.forEach(hora => {
      const [h,m] = hora.split(':').map(Number);
      const dataHora = new Date(data);
      dataHora.setHours(h, m, 0, 0);

      // Mínimo 48h de antecedência
      if(dataHora <= limite24h) return;

      // Verificar se a vaga já está ocupada
      const ocupada = todasReunioes.some(r =>
        r.status === 'agendada' &&
        r.data === dataStr &&
        r.hora === hora
      );
      if(!ocupada) vagas.push({ data: dataStr, hora });
    });
  }
  return vagas;
}

function formatarDataExtenso(dataISO) {
  const [y,m,d] = dataISO.split('-').map(Number);
  const data = new Date(y, m-1, d);
  const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${dias[data.getDay()]}, ${d} de ${meses[m-1]}`;
}

async function confirmarAgendamento(data, hora, link, duracao) {
  const motivo    = $('ag-motivo')?.value;
  const descricao = $('ag-descricao')?.value?.trim();
  const erroEl    = $('ag-erro');

  if(!motivo)   { erroEl.style.display='block'; erroEl.textContent='Selecione o motivo.'; return; }
  if(!descricao || descricao.length < 10) {
    erroEl.style.display='block'; erroEl.textContent='Descreva com mais detalhes (mínimo 10 caracteres).'; return;
  }

  // Verificar novamente se a vaga ainda está livre
  const todasReunioes = await getReunioesPortal();
  const ocupada = todasReunioes.some(r =>
    r.status === 'agendada' && r.data === data && r.hora === hora
  );
  if(ocupada) {
    erroEl.style.display='block';
    erroEl.textContent='Esta vaga acabou de ser ocupada. Escolha outro horário.';
    return;
  }

  const id = 'REU-' + String(Math.floor(Math.random()*9000)+1000);
  const reuniao = {
    id,
    fid:         PORTAL.fid,
    franqueado:  PORTAL.nome,
    ticket:      PORTAL.ticket,
    gestorToken: PORTAL.gestor?.token || '',
    etapa:       PORTAL.etapaAtual,
    data,
    hora,
    link,
    duracao,
    motivo,
    descricao,
    status:      'agendada',
    dataAgendamento: hoje() + ' às ' + agora(),
    timestamp:   Date.now(),
  };

  // Salvar no Firebase
  const novaLista = [...todasReunioes, reuniao];
  try {
    await db.ref('reunioes').set(novaLista);
    // Limpar notificação anterior
    await db.ref('reunioes_notif/' + PORTAL.fid).remove();
  } catch(e) {
    erroEl.style.display='block';
    erroEl.textContent='Erro ao salvar. Tente novamente.';
    return;
  }

  fecharModal();
  toast('Reunião agendada! ' + formatarDataExtenso(data) + ' às ' + hora, 'gn');
  renderAgendaReunioes();
}

async function cancelarReuniaoPortal(reuId) {
  if(!confirm('Cancelar sua reunião? Esta ação fica registrada no histórico.')) return;
  const todasReunioes = await getReunioesPortal();
  const r = todasReunioes.find(x => x.id === reuId);
  if(!r) return;
  r.status = 'cancelada';
  r.canceladaPor = 'franqueado';
  r.dataCancelamento = hoje() + ' às ' + agora();
  try {
    await db.ref('reunioes').set(todasReunioes);
  } catch(e) {}
  toast('Reunião cancelada.', 'or');
  renderAgendaReunioes();
}

function processarNotifGestor(notif) {
  if(!notif || notif._processado) return;

  if(notif.tipo === 'etapa_iniciada') {
    // Atualizar dados locais
    PORTAL.etapaAtual = notif.etapa;
    // Re-renderizar lista de etapas para desbloquear a etapa atual
    if(typeof renderEtapas === 'function') try { renderEtapas(); } catch(e) {}
    // Mostrar banner de nova etapa
    mostrarBannerEtapaIniciada(notif);
    // Atualizar badge
    const badge = document.getElementById('badge-etapas-p');
    if(badge) { badge.style.display='block'; badge.textContent='1'; }
    // Marcar como lido
    try { db.ref('notif_franqueado/' + PORTAL.fid).update({ lido: true, _processado: true }); } catch(e) {}
  }

  if(notif.tipo === 'etapa_aprovada') {
    mostrarBannerEtapaAprovada(notif);
    try { db.ref('notif_franqueado/' + PORTAL.fid).update({ lido: true, _processado: true }); } catch(e) {}
  }

  if(notif.tipo === 'etapa_rejeitada') {
    mostrarBannerEtapaRejeitada(notif);
    try { db.ref('notif_franqueado/' + PORTAL.fid).update({ lido: true, _processado: true }); } catch(e) {}
  }
}

// PASSO 4: Franqueado assina ciência da aprovação (fecha o ciclo)
function abrirCienciaAprovacao(etId) {
  const declaracao = `Eu, ${PORTAL.nome} (${PORTAL.ticket}), declaro ter recebido a notificação de aprovação da Etapa ${etId} pelo gestor e concordo com o avanço para a próxima etapa do processo de implantação. Data: ${hoje()} às ${agora()}.`;

  abrirModal(`✅ Etapa ${etId} aprovada — Assinar ciência`, `
    <div style="background:#F0FDF4;border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--green)">🎉 Parabéns! O gestor aprovou a Etapa ${etId}.</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Assine abaixo para confirmar a ciência e avançar para a próxima etapa.</div>
    </div>
    <div id="ciencia-ass-container"></div>
    <button onclick="fecharModal()" style="width:100%;margin-top:8px;padding:10px;border-radius:10px;background:none;border:1.5px solid var(--border);cursor:pointer;font-size:13px;color:var(--text-dim)">Fechar</button>
  `, '');

  setTimeout(() => {
    renderAssBox('ciencia-ass-container', declaracao, '✍ Assinar ciência e avançar', async () => {
      const hash = Math.abs(declaracao.split('').reduce((h,ch)=>((h<<5)-h)+ch.charCodeAt(0),0)).toString(16);
      const ts   = Date.now();
      const proxEtapa = Number(etId) + 1;

      try {
        // Registrar assinatura de ciência no Firebase
        await db.ref(`validacoes/${PORTAL.fid}/et${etId}`).update({
          cienciaFranqueado:    true,
          declaracaoCiencia:    declaracao,
          hashCiencia:          hash,
          dataCiencia:          hoje(),
          horaCiencia:          agora(),
        });

        // Registrar evento
        await db.ref(`etapas/${PORTAL.fid}/et${etId}/eventos/${ts}`).set({
          tipo:  'ciencia_franqueado',
          texto: `Franqueado assinou ciência da aprovação da Etapa ${etId}. Processo avança para Etapa ${proxEtapa}.`,
          autor: PORTAL.nome,
          hash,
          data:  hoje(), hora: agora(),
        });

        // Avançar etapaAtual no Firebase e localmente
        PORTAL.etapaAtual = proxEtapa;
        try {
          await db.ref('franqueados/' + PORTAL.fid + '/etapaAtual').set(proxEtapa);
        } catch(e2) { console.warn('Avançar etapa:', e2.message); }

        // Notificar gestor com resumo da etapa concluída
        await db.ref(`notif_gestor/${PORTAL.fid}`).set({
          tipo:       'etapa_concluida_ciclo',
          etapa:      etId,
          franqueado: PORTAL.nome,
          ticket:     PORTAL.ticket,
          fid:        PORTAL.fid,
          data:       hoje(), hora: agora(), lido: false,
          timestamp:  ts,
        });

        // Marcar notificação como processada
        await db.ref(`notif_franqueado/${PORTAL.fid}`).update({ lido: true, _processado: true });

        fecharModal();
        toast(`🎉 Etapa ${etId} concluída! Avançando para Etapa ${proxEtapa}.`, 'gn');
        renderEtapas();

      } catch(e) {
        toast('Erro: ' + e.message, 'rd');
      }
    }, '#F5A623', '#1B3F8B');
  }, 150);
}

function anexarDoc(input, docId, etId) {
  const file = input.files?.[0];
  if(!file) return;
  if(file.size > 10*1024*1024) { toast('Arquivo muito grande. Máximo 10MB.','rd'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = async e => {
    const base64 = e.target.result;
    const lista  = getDocs(etId);
    const d      = lista.find(x=>x.id===docId);

    // Salvar referência local (sem base64 pesado — só nome e status)
    if(d) {
      d.nomeAnexo  = file.name;
      d.anexadoEm  = hoje();
      d.status     = 'enviando';
      d.driveUrl   = null;
    }
    try { salvarDocs(etId, lista); } catch(err) {}
    abrirDetalheEtapa(etId);
    toast('Enviando ' + file.name + ' para o Drive...', 'or');

    // Enviar para o Drive
    try {
      const chave   = 'pasta_et' + String(etId).padStart(2,'0') + '_id';
      const pastaId = PORTAL.drivePasstas?.[chave];

      if(pastaId) {
        const result = await appsPost({
          action:      'salvarPDF',
          pastaId,
          nomeArquivo: PORTAL.ticket + '_Et' + etId + '_' + file.name,
          base64:      base64,
          mimeType:    file.type || 'application/pdf',
        });

        if(result?.ok) {
          // Atualizar com URL do Drive
          const lista2 = getDocs(etId);
          const d2 = lista2.find(x=>x.id===docId);
          if(d2) {
            d2.driveUrl  = result.arquivoUrl;
            d2.driveId   = result.arquivoId;
            d2.status    = 'enviado';
            d2.anexo     = base64; // manter cache local
          }
          try { salvarDocs(etId, lista2); } catch(err) {}
          toast('✓ ' + file.name + ' salvo no Drive!', 'gn');
          abrirDetalheEtapa(etId);
          return;
        }
      }
      // Drive não disponível — salvar só localmente
      const lista3 = getDocs(etId);
      const d3 = lista3.find(x=>x.id===docId);
      if(d3) { d3.anexo = base64; d3.status = 'local'; }
      try { salvarDocs(etId, lista3); } catch(err) { toast('Arquivo muito grande para salvar localmente.','rd'); }
      toast('Salvo localmente (Drive indisponível).', 'or');
      abrirDetalheEtapa(etId);
    } catch(err) {
      console.warn('Drive upload:', err.message);
      const lista4 = getDocs(etId);
      const d4 = lista4.find(x=>x.id===docId);
      if(d4) { d4.anexo = base64; d4.status = 'local'; }
      try { salvarDocs(etId, lista4); } catch(e2) {}
      toast('Salvo localmente.', 'or');
      abrirDetalheEtapa(etId);
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}

function solicitarValidacao(etId) {
  fecharModal();

  const declaracao = `Eu, ${PORTAL.nome} (${PORTAL.ticket}), confirmo que cumpri todos os requisitos da Etapa ${etId} do processo de implantação e solicito a validação formal pelo gestor. Data: ${hoje()} às ${agora()}.`;

  abrirModal('Solicitar validação da etapa', `
    <div style="background:#EFF6FF;border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--primary);margin-bottom:4px">Etapa ${etId} — Solicitação de conclusão</div>
      <div style="font-size:11px;color:var(--text-dim);line-height:1.6">
        Ao assinar, você declara que cumpriu todos os requisitos desta etapa.<br>
        O gestor será notificado e validará a conclusão.
      </div>
    </div>
    <div id="sol-ass-container"></div>
    <button onclick="fecharModal()"
      style="width:100%;margin-top:8px;padding:10px;border-radius:10px;background:none;border:1.5px solid var(--border);cursor:pointer;font-size:13px;color:var(--text-dim)">
      Cancelar
    </button>
  `, '');

  setTimeout(() => {
    renderAssBox('sol-ass-container', declaracao, 'Assinar e solicitar validação', async () => {
      const hash = Math.abs(declaracao.split('').reduce((h,ch)=>((h<<5)-h)+ch.charCodeAt(0),0)).toString(16);
      const ts   = Date.now();

      try {
        // 1. Salvar solicitação no Firebase — gestor vai ver via listener
        await db.ref(`validacoes/${PORTAL.fid}/et${etId}`).set({
          fid:         PORTAL.fid,
          franqueado:  PORTAL.nome,
          ticket:      PORTAL.ticket,
          etapa:       etId,
          status:      'aguardando',
          declaracao,
          hash,
          data:        hoje(),
          hora:        agora(),
          timestamp:   ts,
        });

        // 2. Registrar evento na etapa
        await db.ref(`etapas/${PORTAL.fid}/et${etId}/eventos/${ts}`).set({
          tipo:   'solicitacao_validacao',
          texto:  `Franqueado solicitou validação da Etapa ${etId}. Aguardando confirmação do gestor.`,
          autor:  PORTAL.nome,
          data:   hoje(),
          hora:   agora(),
          hash,
        });

        // 3. Notificar o gestor via Firebase
        await db.ref(`notif_gestor/${PORTAL.fid}`).set({
          tipo:      'validacao_etapa',
          etapa:     etId,
          franqueado:PORTAL.nome,
          ticket:    PORTAL.ticket,
          fid:       PORTAL.fid,
          data:      hoje(),
          hora:      agora(),
          lido:      false,
          timestamp: ts,
        });

        fecharModal();
        toast('✓ Solicitação enviada! Aguardando validação do gestor.', 'gn');

        // Atualizar tela de etapas
        renderEtapas();

      } catch(e) {
        toast('Erro ao enviar solicitação: ' + e.message, 'rd');
      }
    }, '#F5A623', '#1B3F8B');
  }, 150);
}

function navCal(d) {
  _calMes+=d;
  if(_calMes>11){_calMes=0;_calAno++;}
  if(_calMes<0){_calMes=11;_calAno--;}
  renderCal();
}

function renderCal() {
  const lbl = $('cal-label-p');
  if(lbl) lbl.textContent = new Date(_calAno,_calMes,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase());
  const heads = $('cal-heads-p');
  if(heads) heads.innerHTML = ['D','S','T','Q','Q','S','S'].map(d=>`<div class="cal-head-p">${d}</div>`).join('');
  const corpo = $('cal-corpo-p');
  if(!corpo) return;
  const evs   = getEventos();
  const hoje2 = new Date(); hoje2.setHours(0,0,0,0);
  const prim  = new Date(_calAno,_calMes,1);
  const ult   = new Date(_calAno,_calMes+1,0);
  const dias  = [];
  for(let i=0;i<prim.getDay();i++) dias.push({d:new Date(_calAno,_calMes,-prim.getDay()+i+1),off:true});
  for(let d=1;d<=ult.getDate();d++) dias.push({d:new Date(_calAno,_calMes,d),off:false});
  const rest=7-(dias.length%7); if(rest<7) for(let i=1;i<=rest;i++) dias.push({d:new Date(_calAno,_calMes+1,i),off:true});
  corpo.innerHTML = dias.map(({d,off})=>{
    const key  = d.toISOString().split('T')[0];
    const isHj = d.getTime()===hoje2.getTime();
    const temEv= evs.some(e=>e.data===key);
    return `<div class="cal-cell-p${off?' off':''}${isHj?' hj':''}" data-calday="${key}">
      <div class="cal-n-p">${d.getDate()}</div>
      ${temEv?'<div class="cal-dot-p"></div>':''}
    </div>`;
  }).join('');
}

function trocarCanal(canal) {
  _chatCanal = canal;
  const bg=$('btn-g'); const bgl=$('btn-gl');
  if(bg)  { bg.classList.toggle('ativo', canal==='gestor'); }
  if(bgl) { bgl.classList.toggle('ativo', canal==='global'); }
  renderMsgs();
  renderChatInput();
}

function renderMsgs() {
  const c = $('chat-msgs-p'); if(!c) return;
  if(_chatCanal==='global') {
    const comuns = getComunicados();
    c.innerHTML = comuns.length
      ? comuns.map(m=>`<div class="balao-global">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="background:var(--primary);color:#fff;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:800">MESTRE DA OBRA</span>
            <span style="font-size:10px;color:var(--text-muted)">${m.data}</span>
          </div>
          <div style="font-size:13px;line-height:1.6;color:var(--text)">${m.texto}</div>
        </div>`).join('')
      : '<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:12px">Nenhum comunicado ainda.</div>';
    c.scrollTop = c.scrollHeight; return;
  }
  const msgs = getMsgs();
  c.innerHTML = msgs.length
    ? msgs.slice(-60).map(m => {
        const eu = m.deFranqueado===true;
        return `<div style="display:flex;flex-direction:column;align-items:${eu?'flex-end':'flex-start'}">
          ${!eu?`<div style="font-size:10px;font-weight:700;color:var(--primary);margin-bottom:3px;padding-left:3px">${PORTAL.gestor.nome.split(' ')[0]}</div>`:''}
          <div class="${eu?'balao-eu':'balao-deles'}">${m.texto}</div>
          <div style="font-size:9px;color:var(--text-muted);margin-top:3px;padding:${eu?'0 3px 0 0':'0 0 0 3px'}">${m.hora}</div>
        </div>`;
      }).join('')
    : `<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:12px;font-style:italic">Inicie a conversa com ${PORTAL.gestor.nome.split(' ')[0]}.</div>`;
  c.scrollTop = c.scrollHeight;
}

function renderChatInput() {
  const w = $('chat-inp-p'); if(!w) return;
  if(_chatCanal==='global') {
    w.innerHTML='<div style="flex:1;text-align:center;font-size:12px;color:var(--text-muted);padding:6px"><i class="fi fi-sr-megaphone" style="margin-right:4px"></i>Apenas a franqueadora publica neste canal</div>';
    return;
  }
  w.innerHTML=`<textarea id="chat-inp-txt" class="chat-input-portal" rows="1"
    placeholder="Mensagem para ${PORTAL.gestor.nome.split(' ')[0]}..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarMsg();}"
    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button onclick="enviarMsg()" style="width:40px;height:40px;border-radius:12px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(245,166,35,.3)">
      <i class="fi fi-sr-paper-plane" style="font-size:16px;color:var(--primary-dark)"></i>
    </button>`;
  setTimeout(()=>$('chat-inp-txt')?.focus(), 100);
}

function enviarMsg() {
  const inp=$('chat-inp-txt'); const txt=inp?.value?.trim();
  if(!txt) return;
  const msgs=getMsgs();
  msgs.push({id:'pm_'+Date.now(),texto:txt,deFranqueado:true,hora:agora(),data:hoje(),ts:Date.now()});
  localStorage.setItem('portal_chat_'+PORTAL.fid, JSON.stringify(msgs));
  inp.value=''; inp.style.height='auto';
  renderMsgs();
}

      <!-- CLÁUSULAS -->
      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA PRIMEIRA — DAS PARTES</span>
      </div>
      <p style="margin-bottom:8px;text-align:justify"><strong>1.1 FRANQUEADORA:</strong> MESTRE DA OBRA FRANQUIAS LTDA, pessoa jurídica de direito privado, inscrita no CNPJ sob o n.º <strong>20.439.256/0001-07</strong>, com sede na Rua Manoel Ribas, 400, Quadra Lote 20, bairro Cara-Cara, município de Ponta Grossa, Estado do Paraná, CEP 84.043-470, doravante denominada simplesmente <strong>FRANQUEADORA</strong>.</p>
      <p style="margin-bottom:16px;text-align:justify"><strong>1.2 FRANQUEADO(A):</strong> pessoa física ou jurídica qualificada no cadastro do sistema no momento da assinatura deste instrumento, cujos dados completos constam registrados na plataforma e integram este Termo para todos os fins legais, doravante denominado(a) simplesmente <strong>FRANQUEADO(A)</strong>.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA SEGUNDA — DO OBJETO</span>
      </div>
      <p style="margin-bottom:16px;text-align:justify">O presente Termo tem por objeto a adesão formal do(a) FRANQUEADO(A) ao <strong>Sistema Digital de Gestão de Implantação de Franquia</strong> da FRANQUEADORA, operado sob a plataforma <strong>Mestre da Obra — Portal do Franqueado</strong>, desenvolvida e mantida pela <strong>PhiPilot Sistemas</strong>, doravante denominado simplesmente <strong>SISTEMA</strong>, estabelecendo as condições, obrigações e responsabilidades que regem o uso da plataforma durante todo o processo de implantação da unidade franqueada.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA TERCEIRA — DO PROCESSO DE IMPLANTAÇÃO POR ETAPAS</span>
      </div>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">3.1</strong> O processo de implantação da unidade franqueada é estruturado em <strong>11 (onze) etapas sequenciais</strong>, cada qual com tarefas, documentos e prazos definidos pela FRANQUEADORA, conforme o cronograma estabelecido no início do processo.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">3.2</strong> O(A) FRANQUEADO(A) declara ter plena ciência de que <strong>nenhuma etapa poderá ser considerada concluída e nenhum avanço ao estágio subsequente será autorizado sem a respectiva assinatura digital</strong> do(a) FRANQUEADO(A), registrada na plataforma com identificação, geolocalização e carimbo de data e hora.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">3.3</strong> A recusa, omissão ou impossibilidade de assinatura digital implica <strong>suspensão automática do avanço do processo</strong>, sem que tal fato gere qualquer responsabilidade à FRANQUEADORA ou direito de indenização ao(à) FRANQUEADO(A).</p>
      <p style="margin-bottom:16px;text-align:justify"><strong style="color:#1B3F8B">3.4</strong> O(A) FRANQUEADO(A) reconhece que o cumprimento das etapas é condição essencial do contrato de franquia e que o descumprimento reiterado poderá ensejar as penalidades previstas no referido contrato.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA QUARTA — DO USO OBRIGATÓRIO DO SISTEMA E DO APLICATIVO</span>
      </div>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">4.1</strong> O(A) FRANQUEADO(A) se compromete a <strong>utilizar o SISTEMA como canal oficial e primário</strong> de acompanhamento de seu processo de implantação.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">4.2</strong> O(A) FRANQUEADO(A) autoriza e se compromete a <strong>instalar o aplicativo móvel do SISTEMA em seu dispositivo pessoal</strong> (smartphone), tão logo seja disponibilizado pela FRANQUEADORA, obrigando-se a mantê-lo instalado e atualizado durante toda a vigência do processo.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">4.3</strong> A comunicação entre o(a) FRANQUEADO(A) e a equipe de implantação dar-se-á <strong>exclusivamente por meio do canal MO Talk</strong>, ferramenta de mensagens integrada ao SISTEMA. Mensagens por canais externos <strong>não terão validade oficial</strong> no processo.</p>
      <p style="margin-bottom:16px;text-align:justify"><strong style="color:#1B3F8B">4.4</strong> A FRANQUEADORA poderá admitir comunicações externas em caráter excepcional, desde que ratificadas no SISTEMA.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA QUINTA — DA CESSÃO DE GEOLOCALIZAÇÃO</span>
      </div>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">5.1</strong> O(A) FRANQUEADO(A) <strong>autoriza expressamente</strong> a coleta, armazenamento e processamento de seus dados de geolocalização (latitude e longitude) no momento de cada assinatura digital.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">5.2</strong> A coleta ocorrerá <strong>exclusivamente no momento do ato de assinatura</strong>, sem monitoramento contínuo ou rastreamento permanente.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">5.3</strong> Os dados serão utilizados para: comprovar o local da assinatura; assegurar autenticidade do ato; e cumprir requisitos de auditoria e conformidade legal.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">5.4</strong> O tratamento observará rigorosamente a <strong>LGPD (Lei n.º 13.709/2018)</strong>, sendo a base legal o legítimo interesse e cumprimento de obrigação contratual, nos termos dos incisos II e IX do art. 7.º.</p>
      <p style="margin-bottom:16px;text-align:justify"><strong style="color:#1B3F8B">5.5</strong> Os dados serão armazenados por período mínimo de <strong>5 (cinco) anos</strong> após o encerramento do contrato.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA SEXTA — DA ASSINATURA DIGITAL E SUA VALIDADE JURÍDICA</span>
      </div>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">6.1</strong> As assinaturas prestadas constituem <strong>assinatura eletrônica</strong> nos termos da <strong>Lei n.º 14.063, de 23 de setembro de 2020</strong>, com os mesmos efeitos jurídicos da assinatura manuscrita.</p>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">6.2</strong> Cada assinatura será acompanhada de: identificação do usuário autenticado; carimbo de data e hora (timestamp UTC); dados de geolocalização; e hash criptográfico do conteúdo assinado.</p>
      <p style="margin-bottom:16px;text-align:justify"><strong style="color:#1B3F8B">6.3</strong> O registro eletrônico gerado pelo SISTEMA constitui <strong>prova plena</strong> do ato, sendo inadmissível alegar desconhecimento após a confirmação.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA SÉTIMA — DAS RESPONSABILIDADES DO(A) FRANQUEADO(A)</span>
      </div>
      <p style="margin-bottom:6px;text-align:justify"><strong style="color:#1B3F8B">7.1</strong> Manter credenciais de acesso sob sigilo absoluto, sendo responsável por todos os atos praticados com seu login.</p>
      <p style="margin-bottom:6px;text-align:justify"><strong style="color:#1B3F8B">7.2</strong> Manter dados cadastrais atualizados no SISTEMA, notificando imediatamente a FRANQUEADORA em caso de qualquer alteração.</p>
      <p style="margin-bottom:6px;text-align:justify"><strong style="color:#1B3F8B">7.3</strong> Realizar o acompanhamento regular das etapas, tarefas, prazos e comunicações, não podendo alegar desconhecimento de notificações enviadas pela plataforma.</p>
      <p style="margin-bottom:6px;text-align:justify"><strong style="color:#1B3F8B">7.4</strong> Realizar o upload dos documentos exigidos em cada etapa dentro dos prazos estabelecidos.</p>
      <p style="margin-bottom:16px;text-align:justify"><strong style="color:#1B3F8B">7.5</strong> Utilizar o SISTEMA de boa-fé, abstendo-se de inserir informações falsas, adulteradas ou enganosas.</p>

      <div style="border-bottom:1.5px solid #E2E8F0;margin-bottom:10px;padding-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:#1B3F8B">CLÁUSULA OITAVA — DAS PENALIDADES</span>
      </div>
      <p style="margin-bottom:8px;text-align:justify"><strong style="color:#1B3F8B">8.1</strong> O descumprimento poderá acarretar: suspensão do acesso ao SISTEMA; suspensão do avanço no processo; penalidades previstas no Contrato de Franquia; rescisão motivada sem direito a indenização; e responsabilização judicial nas esferas cível e criminal.</p>
