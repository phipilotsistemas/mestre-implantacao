function verificarScrollTermo(el) {
  const pct = Math.min(100, Math.round(((el.scrollTop + el.clientHeight) / el.scrollHeight) * 100));
  const prog = $('termo-prog');
  if(prog) prog.style.width = pct+'%';
  const msg = $('termo-leitura-msg');
  if(pct >= 98) {
    const aviso = $('termo-aviso-scroll');
    if(aviso) aviso.style.display = 'none';
    const conf = $('termo-confirmacao');
    if(conf) conf.style.display = 'block';
    if(msg) { msg.style.color='var(--green)'; msg.textContent='✓ Lido — confirme e assine abaixo'; }
  } else {
    if(msg) msg.textContent = pct+'% lido — continue rolando...';
  }
}

function verificarCheckTermo() {
  const btn = $('btn-assinar-termo');
  if(!btn) return;
  const ok = $('chk-termo')?.checked;
  btn.disabled = !ok;
  btn.style.background = ok ? 'var(--primary)' : 'var(--border)';
  btn.style.color = ok ? '#fff' : 'var(--text-muted)';
  btn.style.cursor = ok ? 'pointer' : 'not-allowed';
  btn.style.boxShadow = ok ? '0 4px 16px rgba(27,63,139,.25)' : 'none';
}

function assinarTermo() {
  // Desabilitar botão imediatamente para evitar duplo clique
  const btn = $('btn-assinar-termo');
  if(btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Obtendo localização...';
    btn.style.background = 'var(--border)';
    btn.style.color = 'var(--text-muted)';
    btn.style.cursor = 'not-allowed';
  }

  const registrar = (lat, lon) => {
    const ts  = new Date().toISOString();
    const reg = {
      nome:   PORTAL.nome,
      fid:    PORTAL.fid,
      ticket: PORTAL.ticket,
      ts, data: hoje(), hora: agora(),
      lat:    lat || 'não disponível',
      lon:    lon || 'não disponível',
      hash:   btoa(PORTAL.fid+'|'+ts+'|termo').replace(/=/g,'')
    };
    // Só registra APÓS obter (ou recusar) a localização
    localStorage.setItem('termo_assinado_'+PORTAL.fid, '1');
    localStorage.setItem('termo_registro_'+PORTAL.fid, JSON.stringify(reg));
    mostrarConfirmacaoTermo(reg);
  };

  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        // Permissão concedida — registrar com coordenadas
        registrar(
          pos.coords.latitude.toFixed(6),
          pos.coords.longitude.toFixed(6)
        );
      },
      err => {
        // Permissão negada ou erro — registrar sem coordenadas
        registrar(null, null);
      },
      { timeout: 10000, maximumAge: 0 }
    );
  } else {
    // Navegador sem suporte a geolocalização
    registrar(null, null);
  }
}

function mostrarConfirmacaoTermo(reg) {
  // Gerar PDF do Termo de Adesão no Drive
  (async () => {
    try {
      // Tentar obter pastas do PORTAL (já carregadas)
      let pastas = PORTAL.drivePasstas;

      // Se não tiver, buscar direto no Firebase (pode ter chegado depois do login)
      if(!pastas?.pasta_et00_id) {
        const snap = await db.ref('franqueados/' + PORTAL.fid).once('value');
        const f = snap.val();
        if(f?.drivePasstas) {
          PORTAL.drivePasstas = f.drivePasstas;
          pastas = f.drivePasstas;
        }
      }

      // Se ainda não tiver pastas, o gestor ainda não cadastrou no Drive
      // Tentar criar agora via Apps Script
      if(!pastas?.pasta_et00_id) {
        console.warn('Pastas não encontradas — tentando criar via Apps Script...');
        const result = await fetch(APPS_SCRIPT_URL + '?action=criarPastas' +
          '&fid=' + encodeURIComponent(PORTAL.fid) +
          '&nome=' + encodeURIComponent(PORTAL.nome) +
          '&ticket=' + encodeURIComponent(PORTAL.ticket));
        const novasPastas = await result.json();
        if(!novasPastas.erro) {
          PORTAL.drivePasstas = novasPastas;
          pastas = novasPastas;
          // Salvar no Firebase para o painel ter acesso
          await db.ref('franqueados/' + PORTAL.fid + '/drivePasstas').set(novasPastas);
        }
      }

      const pastaId = pastas?.pasta_et00_id;
      if(pastaId) {
        const result = await appsPost({
          action: 'gerarPDF',
          tipo:   'termo_adesao',
          pastaId,
          dados: {
            ticket: PORTAL.ticket,
            nome:   PORTAL.nome,
            data:   reg.data,
            hora:   reg.hora,
            lat:    reg.lat,
            lon:    reg.lon,
            hash:   reg.hash,
          }
        });
        if(result?.ok) {
          console.log('Termo de Adesão salvo no Drive:', result.arquivoUrl);
          // Registrar URL do termo na ficha
          await db.ref('franqueados/' + PORTAL.fid + '/termoDriveUrl').set(result.arquivoUrl);
        }
      } else {
        console.warn('Pasta 00_Cadastro não disponível — termo salvo apenas localmente.');
      }
    } catch(e) { console.warn('Drive termo adesão:', e.message); }
  })();

  $('portal-content').innerHTML =
    '<div style="min-height:calc(100vh - 120px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">' +
      '<div style="width:80px;height:80px;border-radius:50%;background:var(--green-soft);border:3px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">✓</div>' +
      '<div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px">Termo assinado!</div>' +
      '<div style="font-size:13px;color:var(--text-dim);margin-bottom:20px;line-height:1.6">Sua assinatura digital foi registrada com sucesso.</div>' +
      '<div class="card" style="width:100%;text-align:left;margin-bottom:16px">' +
        '<div class="card-head"><div class="card-title">Registro da assinatura</div></div>' +
        '<div class="card-body" style="padding:8px 20px">' +
          '<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12px">' +
            '<span style="color:var(--text-dim);font-weight:600">Nome</span><span>'+reg.nome+'</span>' +
            '<span style="color:var(--text-dim);font-weight:600">Ticket</span><span>'+reg.ticket+'</span>' +
            '<span style="color:var(--text-dim);font-weight:600">Data/hora</span><span>'+reg.data+' às '+reg.hora+'</span>' +
            '<span style="color:var(--text-dim);font-weight:600">Geoloc.</span><span>'+(reg.lat!=='não disponível'?reg.lat+', '+reg.lon:'Não disponível')+'</span>' +
            '<span style="color:var(--text-dim);font-weight:600">Hash</span><span style="font-family:monospace;font-size:10px;word-break:break-all">'+reg.hash+'</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<button onclick="renderAguardando()" style="width:100%;padding:13px;border-radius:12px;background:var(--primary);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(27,63,139,.25)">Continuar →</button>' +
    '</div>';

  const chave='portal_d_'+PORTAL.fid+'_'+etId;

  if(s) return s;
  const lista=(DOCS_DEFAULT[etId]||[]).map((d,i)=>({id:'d'+etId+'_'+i,titulo:d,anexo:null,nomeAnexo:''}));
  localStorage.setItem(chave,JSON.stringify(lista)); return lista;
}

function salvarDocs(etId, lista) {
  localStorage.setItem('portal_d_'+PORTAL.fid+'_'+etId, JSON.stringify(lista));
}
function toggleTarefa(tid) {
  const etId=PORTAL.etapaAtual;
  const lista=getTarefas(etId);
  const t=lista.find(x=>x.id===tid);
  if(t) t.status=t.status==='ok'?'pend':'ok';
  localStorage.setItem('portal_t_'+PORTAL.fid+'_'+etId,JSON.stringify(lista));
  if(_aba==='inicio') renderInicio(); else abrirDetalheEtapa(etId);
}
function getPrazo(etId) { return localStorage.getItem('prazo_'+PORTAL.fid+'_'+etId)||null; }
function getEventos()   { try{return JSON.parse(localStorage.getItem('portal_agenda_'+PORTAL.fid)||'[]');}catch(e){return[];} }
function getMsgs()      { try{return JSON.parse(localStorage.getItem('portal_chat_'+PORTAL.fid)||'[]');}catch(e){return[];} }
function getComunicados(){ return [{id:'cg1',texto:'Bem-vindo ao Portal da Mestre da Obra! Aqui você acompanha sua implantação e fala com seu gestor.',data:hoje()},{id:'cg2',texto:'📢 Nova campanha de marketing disponível. Fale com seu gestor para mais detalhes.',data:hoje()}]; }

function getAlertas() {
  const a=[];
  const pend=getTarefas(PORTAL.etapaAtual).filter(t=>t.status!=='ok');
  if(pend.length) a.push({icone:'fi fi-sr-clipboard-list-check',tipo:'amber',titulo:`${pend.length} tarefa${pend.length>1?'s':''} pendente${pend.length>1?'s':''}`,sub:`Etapa ${PORTAL.etapaAtual} em andamento`,aba:'etapas'});
  const docs2=getDocs(PORTAL.etapaAtual); const docsPend2=docs2.filter(d=>!d.anexo);
  if(docsPend2.length) a.push({icone:'fi fi-sr-document',tipo:'amber',titulo:`${docsPend2.length} documento${docsPend2.length>1?'s':''} a entregar`,sub:`Etapa ${PORTAL.etapaAtual} — anexe os arquivos obrigatórios`,aba:'etapas'});
  const prazo=getPrazo(PORTAL.etapaAtual);
  if(prazo){const hoje2=new Date();hoje2.setHours(0,0,0,0);const dias=Math.floor((new Date(prazo+'T00:00')-hoje2)/(864e5));if(dias<=3)a.push({icone:'fi fi-sr-clock',tipo:dias<0?'red':'amber',titulo:dias<0?'Prazo vencido':`Prazo vencendo em ${dias}d`,sub:`Etapa ${PORTAL.etapaAtual}`,aba:'etapas'});}
  return a;
}
function atualizarBadges() {
  const a=getAlertas(); const b=$('badge-agenda-p');
  if(b){if(a.length){b.style.display='flex';b.textContent=a.length;}else b.style.display='none';}
}

/* ══ MODAL/TOAST (do painel interno) ══ */
function abrirModal(titulo, corpo, rodape) {
  $('modal-titulo').textContent = titulo;
  $('modal-body').innerHTML = corpo;
  $('modal-foot').innerHTML = rodape || '';
  $('modal-bg').classList.add('open');
}
function fecharModal() { $('modal-bg').classList.remove('open'); }
function toast(msg, tipo='or') {
  const w=$('toast-wrap'); if(!w) return;
  const el=document.createElement('div');
  el.className=`toast ${tipo}`;
  el.innerHTML=`<div class="t-dot"></div>${msg}`;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}


/* ── ANEXOS ── */
function anexarArquivo(input, tid) {
  const file = input.files?.[0];
  if(!file) return;
  if(file.size > 10 * 1024 * 1024) {
    toast('Arquivo muito grande. Máximo 10MB.','rd');
    input.value=''; return;
  }

  const reader = new FileReader();
  reader.onload = async e => {
    const base64 = e.target.result;
    const etId   = PORTAL.etapaAtual;
    const lista  = getTarefas(etId);
    const t      = lista.find(x=>x.id===tid);

    // Marcar como enviando
    if(t) { t.nomeAnexo = file.name; t.anexadoEm = hoje(); t.status = 'enviando'; }
    try { localStorage.setItem('portal_t_'+PORTAL.fid+'_'+etId, JSON.stringify(lista)); } catch(err) {}
    if(_aba==='inicio') renderInicio(); else abrirDetalheEtapa(etId);
    toast('Enviando ' + file.name + ' para o Drive...', 'or');

    try {
      const chave   = 'pasta_et' + String(etId).padStart(2,'0') + '_id';
      const pastaId = PORTAL.drivePasstas?.[chave];

      if(pastaId) {
        const result = await appsPost({
          action:      'salvarPDF',
          pastaId,
          nomeArquivo: PORTAL.ticket + '_Et' + etId + '_' + file.name,
          base64,
          mimeType:    file.type || 'application/pdf',
        });

        if(result?.ok) {
          const lista2 = getTarefas(etId);
          const t2 = lista2.find(x=>x.id===tid);
          if(t2) {
            t2.anexo    = base64;
            t2.nomeAnexo= file.name;
            t2.driveUrl = result.arquivoUrl;
            t2.driveId  = result.arquivoId;
            t2.status   = 'enviado';
          }
          try { localStorage.setItem('portal_t_'+PORTAL.fid+'_'+etId, JSON.stringify(lista2)); } catch(err) {}
          toast('✓ ' + file.name + ' salvo no Drive!', 'gn');
          if(_aba==='inicio') renderInicio(); else abrirDetalheEtapa(etId);
          return;
        }
      }
      // Fallback local
      const lista3 = getTarefas(etId);
      const t3 = lista3.find(x=>x.id===tid);
      if(t3) { t3.anexo = base64; t3.status = 'local'; }
      try { localStorage.setItem('portal_t_'+PORTAL.fid+'_'+etId, JSON.stringify(lista3)); } catch(err) {}
      toast('Salvo localmente (Drive indisponível).', 'or');
      if(_aba==='inicio') renderInicio(); else abrirDetalheEtapa(etId);
    } catch(err) {
      console.warn('Drive upload tarefa:', err.message);
      const lista4 = getTarefas(etId);
      const t4 = lista4.find(x=>x.id===tid);
      if(t4) { t4.anexo = base64; t4.status = 'local'; }
      try { localStorage.setItem('portal_t_'+PORTAL.fid+'_'+etId, JSON.stringify(lista4)); } catch(err2) {}
      toast('Salvo localmente.', 'or');
      if(_aba==='inicio') renderInicio(); else abrirDetalheEtapa(etId);
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}

function verAnexo(tid) {
  const lista = getTarefas(PORTAL.etapaAtual);
  const t     = lista.find(x=>x.id===tid);
  if(!t?.anexo) return;

  // Detectar tipo
  const isPDF = t.nomeAnexo?.toLowerCase().endsWith('.pdf');
  const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(t.nomeAnexo||'');

  if(isPDF) {
    // Abrir PDF em nova aba
    const blob = dataURItoBlob(t.anexo);
    const url  = URL.createObjectURL(blob);
    window.open(url,'_blank');
    return;
  }

  if(isImg) {
    abrirModal(t.nomeAnexo,
      `<img src="${t.anexo}" style="max-width:100%;border-radius:8px;display:block;margin:0 auto">`,
      `<button class="btn" style="width:100%" onclick="fecharModal()">Fechar</button>
       <button class="btn" style="width:100%;margin-top:6px;color:var(--red);border-color:#FECACA" onclick="removerAnexo('${tid}')">Remover anexo</button>`
    );
    return;
  }

  // Outros formatos — download
  const a  = document.createElement('a');
  a.href   = t.anexo;
  a.download = t.nomeAnexo;
  a.click();
}

function removerAnexo(tid) {
  const etId = PORTAL.etapaAtual;
  const lista= getTarefas(etId);
  const t    = lista.find(x=>x.id===tid);
  if(t) { delete t.anexo; delete t.nomeAnexo; delete t.anexadoEm; }
  localStorage.setItem('portal_t_'+PORTAL.fid+'_'+etId, JSON.stringify(lista));
  fecharModal();
  toast('Anexo removido.','or');
  if(_aba==='inicio') renderInicio();
  else abrirDetalheEtapa(etId);
}

function dataURItoBlob(dataURI) {
  const byteStr = atob(dataURI.split(',')[1]);
  const mime    = dataURI.split(',')[0].split(':')[1].split(';')[0];
  const buf     = new ArrayBuffer(byteStr.length);
  const arr     = new Uint8Array(buf);
  for(let i=0;i<byteStr.length;i++) arr[i] = byteStr.charCodeAt(i);
  return new Blob([buf],{type:mime});
}

/* ══ EVENT DELEGATION ══ */
document.addEventListener('click', e => {
  // Alertas
  const al=e.target.closest('.alerta-row');
  if(al){const ab=al.dataset.aba;irAba(ab,document.querySelector(`[data-aba=${ab}]`));return;}
  // Nav data-nav
  const nav=e.target.closest('[data-nav]');
  if(nav){const ab=nav.dataset.nav;irAba(ab,document.querySelector(`[data-aba=${ab}]`));return;}
  // Etapas
  const et=e.target.closest('[data-etid]');
  if(et&&et.dataset.lock!=='1'){abrirDetalheEtapa(parseInt(et.dataset.etid));return;}
  // Tarefas
  const tb=e.target.closest('.task-check[data-tid]');
  if(tb){toggleTarefa(tb.dataset.tid);return;}
  // Calendário
  const cd=e.target.closest('[data-calday]');
  if(cd){abrirNovoEvento(cd.dataset.calday);return;}
});
